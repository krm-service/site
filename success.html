  <script>
    (function () {
      try {
        var k = "krm-theme";
        var t = localStorage.getItem(k);
        if (t !== "light" && t !== "dark")
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
        var mc = document.querySelector("#meta-theme-color");
        if (mc) mc.setAttribute("content", t === "light" ? "#eef3fb" : "#050914");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
        document.documentElement.style.colorScheme = "dark";
      }
    })();
  </script>

<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="page">
    <main class="main bridge">
      <h1 class="title bridge__title">
        Розказую, як заробляти <em>місячну ЗП</em> «як на заводі» — за день, з ліжка
      </h1>
      <p class="bridge__lead">
        Далі все в Telegram: матеріали, розбори й спільнота. Зараз автоматично відкриємо групу — зачекай кілька секунд або натисни кнопку нижче.
      </p>
      <p class="bridge__countdown" id="bridge-countdown" aria-live="polite">
        Перенаправлення через <span id="bridge-sec">3</span> с…
      </p>
      <div class="actions bridge__actions">
        <button type="button" class="btn btn--primary bridge__open" id="bridge-now">
          <span class="btn__label">Відкрити Telegram зараз</span>
        </button>
      </div>
      <p class="hint"><a class="bridge__back" href="index.html">← Назад на головну</a></p>
    </main>
  </div>
  <script src="theme.js"></script>
  <script>
    (function () {
      function inviteUrl() {
        return atob("aHR0cHM6Ly90Lm1lLys1OG9Ma1p2bEZKSmhOamRp");
      }
      var sec = 3;
      var secEl = document.getElementById("bridge-sec");
      var label = document.getElementById("bridge-countdown");
      var timerId;
      function goTelegram() {
        if (timerId) clearInterval(timerId);
        if (label) label.textContent = "Відкриваємо Telegram…";
        window.location.href = inviteUrl();
      }
      document.getElementById("bridge-now").addEventListener("click", goTelegram);
      setTimeout(function () {
        timerId = setInterval(function () {
          sec -= 1;
          if (secEl) secEl.textContent = String(Math.max(0, sec));
          if (sec <= 0) {
            clearInterval(timerId);
            goTelegram();
          }
        }, 1000);
      }, 0);
    })();
  </script>
</body>
</html>
